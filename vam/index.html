<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뱀파이어 서바이벌</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #gameCanvas {
            display: block;
            background-color: #16213e;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        
        .stat {
            margin-bottom: 10px;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #levelUpPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 20px;
            display: none;
            z-index: 20;
        }
        
        .upgrade-option {
            display: block;
            margin: 10px 0;
            padding: 10px 20px;
            background-color: #444;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .upgrade-option:hover {
            background-color: #666;
        }
        
        #gameOverPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff4444;
            border-radius: 15px;
            padding: 30px;
            display: none;
            z-index: 30;
            text-align: center;
            min-width: 300px;
        }
        
        .game-over-title {
            color: #ff4444;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .stat-line {
            margin: 10px 0;
            font-size: 18px;
            color: #fff;
        }
        
        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }
        
        .restart-button {
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        
        .restart-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="stat" id="level">레벨: 1</div>
            <div class="stat" id="exp">경험치: 0/10</div>
            <div class="stat" id="health">체력: 100/100</div>
            <div class="stat" id="timer">시간: 0:00</div>
            <div style="font-size: 14px; margin-top: 10px; color: #ccc;">
                <div>조작: WASD 또는 방향키로 이동</div>
                <div>공격: 자동으로 가까운 적 공격</div>
                <div>적은 1초마다 화면 가장자리에서 생성</div>
            </div>
            <div style="font-size: 12px; margin-top: 10px; color: #999;">
                <div style="color: #FFD700; font-weight: bold;">지형 정보:</div>
                <div>🟫 회색 벽: 모든 개체 통과 불가</div>
                <div>🟤 나무 바리케이드: 투사체만 막음</div>
                <div>⚠️ 빨간 함정: 플레이어만 막음</div>
                <div style="color: #90EE90;">경계벽에 적 스폰 통로 있음</div>
            </div>
            <div style="font-size: 14px; margin-top: 15px;">
                <div style="color: #FFD700; font-weight: bold;">보유 무기:</div>
                <div id="weaponList" style="color: #ccc; font-size: 12px;"></div>
            </div>
        </div>
        <div id="levelUpPanel">
            <h3>레벨 업! 업그레이드를 선택하세요</h3>
            <div id="upgradeOptions"></div>
        </div>
        <div id="gameOverPanel">
            <div class="game-over-title">게임 오버</div>
            <div class="stat-line">최종 레벨: <span class="stat-value" id="finalLevel">1</span></div>
            <div class="stat-line">생존 시간: <span class="stat-value" id="finalTime">0:00</span></div>
            <div class="stat-line">처치한 적: <span class="stat-value" id="finalKills">0</span>마리</div>
            <div class="stat-line">보유 무기: <span class="stat-value" id="finalWeapons">기본총</span></div>
            <button class="restart-button" onclick="restartGame()">다시 시작</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
